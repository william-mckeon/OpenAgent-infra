# =============================================================================
# docker-compose.yml  (project root)
#
# Design decisions
# ---------------------------------------
# 1. Single service — openagent-infra only.
#    Inference runs on an external BYOC provider, so this repo needs no local
#    inference server and no local model download step; this file runs the
#    FastAPI proxy and nothing else.
#
# 2. No volumes — no model weights live here. There is nothing to download or
#    mount locally.
#
# 3. No GPU dependency — the proxy has no CUDA requirement. There is no
#    deploy.resources.reservations block; openagent-infra is a pure Python
#    web application.
#
# 4. Port topology:
#      openagent-api (:8001) → openagent-infra (:8002) → BYOC provider endpoint
#    openagent-infra is the only service. It validates auth, injects reasoning
#    effort, routes by the optional model field, and proxies to the provider's
#    OpenAI-compatible endpoint(s). Endpoint URLs are set via BASE_MODEL_URL
#    (and optionally NERVOUS_SYSTEM_URL) in .env.
#
# 5. All secrets come from the root .env file.
#    API_KEY, PROVIDER_API_KEY, BASE_MODEL_URL, NERVOUS_SYSTEM_URL, and
#    REASONING_EFFORT are never hardcoded — always loaded via env_file.
#
# 6. System prompt — the persona is owned by openagent-api.
#    openagent-api sends it as the first system message on every /chat request.
#    openagent-infra never loads or stores a system prompt.
#
# 7. API key auth — openagent-infra validates X-API-Key on every /chat request.
#    It forwards to the provider using PROVIDER_API_KEY as a Bearer token.
#    These are two separate keys — one facing the caller, one facing the
#    provider.
#
# 8. REASONING_EFFORT — both models support configurable reasoning effort.
#    Default is medium. The proxy injects the effort level into the system
#    message automatically. openagent-api or any tooling can override per
#    request (low / medium / high).
#
# Note: the `version` field has been intentionally removed. Modern Docker
# Compose treats it as obsolete and emits a warning without it.
#
# Usage (from project root)
# -------------------------
#   docker-compose build --no-cache
#   docker-compose up -d openagent-infra
#
# Then send requests:
#   curl http://localhost:8002/health
#
#   curl -X POST http://localhost:8002/chat \
#     -H "Content-Type: application/json" \
#     -H "X-API-Key: your_api_key_here" \
#     -d '{"messages": [{"role": "system", "content": "You are OpenAgent..."}, {"role": "user", "content": "hello"}], "reasoning_effort": "medium"}' \
#     --no-buffer
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # openagent-infra
  #
  # Runs the FastAPI proxy on port 8002. The only service in this repo.
  #
  # Responsibilities:
  #   - Validates X-API-Key header on every /chat request (401 if invalid)
  #   - Validates OpenAI messages format request body
  #   - Injects reasoning_effort into the system message before forwarding
  #   - Routes to BASE_MODEL_URL (default) or NERVOUS_SYSTEM_URL based on the
  #     optional model field
  #   - Forwards validated requests to the provider via httpx async streaming
  #     using PROVIDER_API_KEY as the Authorization: Bearer header
  #   - Streams the SSE response back to the caller
  #   - /health checks proxy status and both provider endpoints
  #
  # Port 8002 is the only externally exposed port here.
  # Port 8001 is reserved for openagent-api; port 8000 for openagent-frontend.
  # Topology: openagent-api (:8001) → openagent-infra (:8002) → BYOC provider
  #
  # BASE_MODEL_URL in .env must be set to your provider's full
  # OpenAI-compatible chat-completions endpoint, e.g.:
  #   https://your-provider.com/v1/chat/completions
  # ---------------------------------------------------------------------------
  openagent-infra:
    build:
      context: .
      dockerfile: docker/model/Dockerfile
    image: openagent-infra:latest
    container_name: openagent-infra
    env_file:
      - .env
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8002"]
    ports:
      - "8002:8002"
    restart: unless-stopped